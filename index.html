<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ban do Leaflet voi co Viet Nam o My</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #e5eefc 0%, #f8fafc 100%);
      }

      .page {
        min-height: 100vh;
        padding: 16px;
      }

      .card {
        max-width: 1200px;
        margin: 0 auto;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid #d7e3f3;
        box-shadow: 0 24px 80px rgba(24, 39, 75, 0.16);
        background: #ffffff;
      }

      .heading {
        padding: 18px 22px;
        background: linear-gradient(135deg, #b91c1c 0%, #dc2626 55%, #f59e0b 100%);
        color: #ffffff;
      }

      .heading h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .heading p {
        margin: 8px 0 0;
        font-size: 15px;
      }

      #map {
        width: 100%;
        height: calc(100vh - 136px);
        min-height: 560px;
      }

      @media (max-width: 720px) {
        .page {
          padding: 0;
        }

        .card {
          border-radius: 0;
          border: 0;
          box-shadow: none;
        }

        .heading h1 {
          font-size: 22px;
        }

        #map {
          height: calc(100vh - 126px);
          min-height: 500px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="heading">
          <h1>Ban do Leaflet dat co Viet Nam tren dat My</h1>
          <p>Vi tri duoc hardcode tai Dallas, Texas, United States.</p>
        </header>
        <div id="map" aria-label="Ban do Leaflet"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const markerLat = 32.78306;
      const markerLng = -96.80667;

      const map = L.map("map").setView([markerLat, markerLng], 14);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
      }).addTo(map);

      const flagIcon = L.icon({
        iconUrl: "flag-vn-150.png",
        iconSize: [150, 150],
        iconAnchor: [75, 150],
        popupAnchor: [0, -140],
      });

      const marker = L.marker([markerLat, markerLng], { icon: flagIcon });
      marker.addTo(map);
      marker.bindPopup("Dallas, Texas, United States").openPopup();

      window.addEventListener("load", () => {
        map.invalidateSize();
      });
    </script>
  </body>
</html>
